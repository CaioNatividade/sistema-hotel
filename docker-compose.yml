services:
  # ---------------------------------------------------------------
  # Banco de dados PostgreSQL
  # ---------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: hotel_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: hotel_reservas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: senha123
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hotel_reservas"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------
  # Aplicação PHP-FPM
  # ---------------------------------------------------------------
  app:
    build: .
    container_name: hotel_app
    restart: unless-stopped
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=hotel_reservas
      - DB_USER=postgres
      - DB_PASS=senha123
      - JWT_SECRET=super_secret_key_123
    volumes:
      - .:/var/www/html
    depends_on:
      db:
        condition: service_healthy

  # ---------------------------------------------------------------
  # Nginx — reverse proxy
  # ---------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: hotel_nginx
    restart: unless-stopped
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  pgdata: